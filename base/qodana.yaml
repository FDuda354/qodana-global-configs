#-------------------------------------------------------------------------------#
#   HERCU team — shared Qodana rules pulled by every project in the HERCU team. #
#   Local project `qodana.yaml` files declare only project-specific overrides   #
#   (linter, JDK, per-project dependency overrides).                            #
#-------------------------------------------------------------------------------#
version: "1.0"

# Bazowy profil + lokalne wzmocnienia inspekcji
profile:
  name: qodana.recommended

  inspections:
    - inspection: CheckDependencyLicenses
      enabled: true
      options:
        usePackageSearch: true

    - inspection: HardcodedPasswords
      enabled: true
      options:
        reportDefaultSuspiciousVariableNames: true

# ---------- License rules (allow-list) ----------
# Wszystkie poniższe licencje są kompatybilne z projektami proprietary Dudios:
#   - Apache / BSD / MIT / ISC / 0BSD — fully permissive
#   - EPL-2.0 — permissive, no copyleft na linked code
#   - LGPL-2.1 — dynamic linking z proprietary OK
#   - GPL-2.0-only + Classpath-exception-2.0 — the JDK/Jakarta pattern,
#     klauzula Classpath explicitly wyłącza GPL contamination
#   - CDDL-1.0 / 1.1 — Mozilla-style, permissive
#   - Apache-1.1 — predecessor Apache-2.0, tożsame warunki
#   - CC-BY-4.0 / CC0-1.0 / OFL-1.1 / PUBLIC-DOMAIN — bundled assets
#     (fonty, sample PDF-y, ikony) w jarach typu pdfbox
#   - WTFPL — permissive, używane przez niektóre npm paczki
licenseRules:
  - keys:
      - "Apache-1.1"
      - "Apache-2.0"
      - "BSD-2-Clause"
      - "BSD-3-Clause"
      - "0BSD"
      - "MIT"
      - "ISC"
      - "EPL-2.0"
      - "CDDL-1.0"
      - "CDDL-1.1"
      - "LGPL-2.1-only"
      - "LGPL-2.1-or-later"
      - "GPL-2.0-only"
      - "Classpath-exception-2.0"
      - "CC0-1.0"
      - "CC-BY-4.0"
      - "OFL-1.1"
      - "OFL-1.1-no-RFN"
      - "PUBLIC-DOMAIN"
      - "WTFPL"
    allowed:
      - "*"

# ---------- Common excludes ----------
exclude:
  - name: All
    paths:
      - build
      - .gradle
      - .idea

# ---------- License audit overrides (deps używane w wielu projektach) ----------
dependencyOverrides:
  # Lombok is dual-licensed under BSD-3-Clause-No-Trademark OR MIT.
  # We elect MIT — unambiguous, fully permissive, compatible with proprietary.
  # Source: https://projectlombok.org/LICENSE
  - name: "lombok"
    version: "1.18.44"
    url: "https://projectlombok.org/LICENSE"
    licenses:
      - key: "MIT"
        url: "https://opensource.org/licenses/MIT"

  # Tomcat embeds Oracle servlet-api documentation stubs which carry a
  # "PROPRIETARY-LICENSE" tag in their metadata. The actual Tomcat code we
  # depend on is Apache-2.0. We do not redistribute those doc stubs.
  - name: "tomcat-embed-core"
    version: "11.0.20"
    url: "https://www.apache.org/licenses/LICENSE-2.0"
    licenses:
      - key: "Apache-2.0"
        url: "https://www.apache.org/licenses/LICENSE-2.0"

# ---------- Quality Gate (organization-wide standard) ----------
failureConditions:
  severityThresholds:
    any: 0
    critical: 0
    high: 0