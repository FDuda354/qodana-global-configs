#-------------------------------------------------------------------------------#
#   HERCU team — shared Qodana rules pulled by every project in the HERCU team. #
#-------------------------------------------------------------------------------#
version: "1.0"

# Profile + jego wzmocnienia wszystko razem w jednym bloku `profile`.
profile:
  name: qodana.recommended

  # Wzmocnienia konkretnych inspekcji. Muszą być zagnieżdżone pod profile,
  # nie na top-level — Qodana odrzuci plik z "Unexpected keys: [inspections]".
  inspections:
    - inspection: CheckDependencyLicenses
      enabled: true
      options:
        usePackageSearch: true

    - inspection: HardcodedPasswords
      enabled: true
      options:
        reportDefaultSuspiciousVariableNames: true

exclude:
  - name: All
    paths:
      - build
      - .gradle
      - .idea

dependencyOverrides:
  - name: "lombok"
    version: "1.18.44"
    url: "https://projectlombok.org/LICENSE"
    licenses:
      - key: "MIT"
        url: "https://opensource.org/licenses/MIT"

failureConditions:
  severityThresholds:
    any: 0
    critical: 0
    high: 0